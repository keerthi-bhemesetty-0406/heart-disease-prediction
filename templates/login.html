<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HeartGuard AI - Sign In</title>
    <style>
        /* Base Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f0f7ff; /* Very light blue background like the gradient start */
            color: #1a1a1a;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Sign-in Card */
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }

        /* Icon */
        .icon-box {
            width: 45px;
            height: 45px;
            background: #2563eb;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%; /* Circle icon in this view */
            margin: 0 auto 20px;
        }

        /* Text Styles */
        h2 {
            font-size: 1.5rem;
            margin-bottom: 8px;
            color: #0f172a;
            font-weight: 700;
        }

        p.subtitle {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 30px;
        }

        /* Form Elements */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            color: #475569;
        }

        .input-container {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            width: 16px;
            height: 16px;
        }

        input {
            width: 100%;
            padding: 12px 12px 12px 40px; /* Space for icon */
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9rem;
            background-color: #f8fafc;
        }

        input::placeholder {
            color: #94a3b8;
        }

        /* Primary Button */
        .btn-primary {
            width: 100%;
            background-color: #2563eb;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }

        .btn-primary:hover {
            background-color: #1d4ed8;
        }

        /* Small text links */
        p.small-text {
            color: #64748b;
            font-size: 0.85rem;
            margin-top: 20px;
        }

        p.small-text a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        p.small-text a:hover {
            text-decoration: underline;
        }

    </style>
</head>
<body>

    <div class="card">
        <div class="icon-box">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 14c1.49-1.46 3-3.21 3-5.5A5.5 5.5 0 0 0 16.5 3c-1.76 0-3 .5-4.5 2-1.5-1.5-2.74-2-4.5-2A5.5 5.5 0 0 0 2 8.5c0 2.3 1.5 4.05 3 5.5l7 7Z"/></svg>
        </div>

        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to HeartGuard AI</p>

        <form action="/login" method="POST">
    <div class="form-group">
        <label for="email">Email</label>
        <div class="input-container">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
            <!-- Added name="email" -->
            <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <div class="input-container">
            <svg class="input-icon" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
            <!-- Added name="password" -->
            <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>
    </div>

    <button type="submit" class="btn-primary">Log In</button>
</form>
        <p class="small-text">Don't have an account? <a href="{{ url_for('signup') }}">Sign up</a></p>
    </div>

    
</body>
</html>
